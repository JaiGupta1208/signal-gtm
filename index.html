<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signal — find who you should be selling to</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.5/babel.min.js"></script>
</head>
<body class="bg-stone-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const EXAMPLES = ["Mutiny", "Rippling", "Notion", "a payroll platform for global teams"];

    function band(score) {
      if (score >= 75) return { ring: "text-emerald-600", bar: "bg-emerald-500" };
      if (score >= 50) return { ring: "text-amber-600", bar: "bg-amber-500" };
      return { ring: "text-rose-600", bar: "bg-rose-500" };
    }

    async function callBackend(payload) {
      const res = await fetch("/api/gemini", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    function Signal() {
      const [company, setCompany] = useState("");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [drafts, setDrafts] = useState({});

      async function findFits() {
        if (!company.trim()) { setError("Enter your company name or domain to start."); return; }
        setLoading(true); setError(null); setResult(null); setDrafts({});
        try {
          const parsed = await callBackend({ action: "find", company });
          parsed.matches = (parsed.matches || []).sort((a, b) => b.score - a.score);
          setResult(parsed);
        } catch (err) {
          setError("Something went wrong building that list. Try again in a moment.");
        } finally {
          setLoading(false);
        }
      }

      async function draftEmail(i, match) {
        setDrafts((d) => ({ ...d, [i]: { loading: true } }));
        try {
          const parsed = await callBackend({
            action: "draft",
            company,
            summary: result.your_company_summary,
            icp: result.inferred_icp,
            match,
          });
          setDrafts((d) => ({ ...d, [i]: { ...parsed, loading: false } }));
        } catch (err) {
          setDrafts((d) => ({ ...d, [i]: { loading: false, error: true } }));
        }
      }

      function gmailLink(draft) {
        return "https://mail.google.com/mail/?view=cm&fs=1&su=" +
          encodeURIComponent(draft.subject) + "&body=" + encodeURIComponent(draft.body);
      }

      return (
        <div className="min-h-screen text-stone-900 px-5 py-10 flex justify-center">
          <div className="w-full max-w-2xl">
            <div className="mb-8">
              <div className="text-xs font-mono tracking-[0.25em] text-stone-400 uppercase mb-2">Go-to-market tooling</div>
              <h1 className="text-3xl font-semibold tracking-tight">Signal</h1>
              <p className="text-stone-500 mt-1 text-sm">Tell it who you are. It infers who you sell to, finds and scores companies that fit, and drafts a personalized email you can open in Gmail. No ICP, no list, no copywriting required.</p>
            </div>

            <div className="bg-white border border-stone-200 rounded-2xl p-5 shadow-sm">
              <label className="block text-sm font-medium text-stone-700 mb-1.5">Your company name or domain</label>
              <input
                value={company}
                onChange={(e) => setCompany(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && findFits()}
                placeholder="e.g. Mutiny, or a one-line description of what you do"
                className="w-full border border-stone-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent"
              />
              <div className="flex flex-wrap gap-1.5 mt-2">
                {EXAMPLES.map((ex) => (
                  <button key={ex} onClick={() => setCompany(ex)} className="text-xs px-2.5 py-1 rounded-full bg-stone-100 text-stone-600 hover:bg-stone-200 transition">{ex}</button>
                ))}
              </div>
              <button onClick={findFits} disabled={loading} className="w-full mt-4 bg-stone-900 text-white rounded-lg py-3 text-sm font-medium hover:bg-stone-800 transition disabled:opacity-50">
                {loading ? "Working out your ICP and finding fits..." : "Find companies that fit"}
              </button>
              {error && <div className="mt-3 text-sm text-rose-600">{error}</div>}
            </div>

            {result && (
              <React.Fragment>
                <div className="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm mt-5">
                  <div className="text-xs font-mono tracking-widest uppercase text-stone-400 mb-2">We think you sell to</div>
                  <p className="text-sm text-stone-800 leading-relaxed">{result.inferred_icp}</p>
                </div>

                <div className="bg-white border border-stone-200 rounded-2xl p-6 shadow-sm mt-5">
                  <div className="text-xs font-mono tracking-widest uppercase text-stone-400 mb-4">Companies that fit, ranked</div>
                  <div className="divide-y divide-stone-100">
                    {result.matches.map((m, i) => {
                      const b = band(m.score);
                      const d = drafts[i];
                      return (
                        <div key={i} className="py-4">
                          <div className="flex items-start gap-4">
                            <div className={"text-2xl font-semibold tabular-nums w-12 shrink-0 " + b.ring}>{m.score}</div>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-center justify-between gap-3">
                                <div className="text-sm font-medium text-stone-900">{m.company}</div>
                                <button onClick={() => draftEmail(i, m)} className="text-xs text-stone-500 hover:text-stone-900 transition shrink-0">
                                  {d?.loading ? "Drafting..." : d?.subject ? "Redraft" : "Draft email"}
                                </button>
                              </div>
                              <div className="text-sm text-stone-500 leading-snug mt-0.5">{m.reason}</div>
                              <div className="h-1.5 w-full bg-stone-100 rounded-full overflow-hidden mt-2">
                                <div className={"h-full rounded-full " + b.bar} style={{ width: m.score + "%" }} />
                              </div>
                              {d?.error && <div className="text-xs text-rose-600 mt-3">Couldn't draft that one. Try again.</div>}
                              {d?.subject && (
                                <div className="bg-stone-50 border border-stone-200 rounded-xl p-4 mt-3">
                                  <div className="text-xs text-stone-400 mb-1">Subject</div>
                                  <div className="text-sm font-medium text-stone-900 mb-3">{d.subject}</div>
                                  <div className="text-xs text-stone-400 mb-1">Body</div>
                                  <p className="text-sm text-stone-700 leading-relaxed whitespace-pre-line">{d.body}</p>
                                  <div className="flex gap-3 mt-4">
                                    <a href={gmailLink(d)} target="_blank" rel="noopener noreferrer" className="text-xs bg-stone-900 text-white px-3 py-1.5 rounded-lg hover:bg-stone-800 transition">Open in Gmail</a>
                                    <button onClick={() => navigator.clipboard?.writeText(d.subject + "\n\n" + d.body)} className="text-xs text-stone-500 hover:text-stone-900 transition">Copy</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </React.Fragment>
            )}

            <p className="text-xs text-stone-400 mt-4 leading-relaxed">
              This version infers the ICP and pulls candidate companies from the model's knowledge, and drafts each email into a Gmail compose window. A production version would connect a live data source (Lusha, ZoomInfo, or ContactOut) to verify companies and pull real contact emails.
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Signal />);
  </script>
</body>
</html>
